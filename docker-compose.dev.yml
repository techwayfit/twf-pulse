version: '3.8'

services:
  mariadb:
  image: mariadb:10.11
    container_name: pulse-mariadb-dev
    environment:
   MYSQL_ROOT_PASSWORD: devpassword
    MYSQL_DATABASE: pulse_dev
   MYSQL_USER: pulseuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - pulse-mariadb-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulse-mariadb-data:
    driver: local
